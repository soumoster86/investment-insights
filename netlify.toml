# Static site + serverless functions (Phase 4)
[build]
  publish = "."
  # No build command required; functions deploy from netlify/functions

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Cache static assets; HTML stays short-lived for content updates
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "interest-cohort=()"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "public, max-age=60"

# Pretty URL for home
[[redirects]]
  from = "/home"
  to = "/"
  status = 302
